          <li>✅ rules.yaml의 <code class="mono bg-white px-1 rounded">:Agency/AG-02</code> 참조 *그대로* 유효</li>
          <li>✅ 과거 incidents.csv의 모든 참조 *그대로* 유효 (옛 데이터 보존)</li>
          <li>✅ "국가유산청" 검색 → 옛 기록도 자동 매칭 (rdfs:label)</li>
          <li>✅ "문화재청" 검색 → 옛/새 모두 매칭 (skos:altLabel)</li>
          <li>✅ historical accuracy + 현재 search *둘 다 유지*</li>
        </ul>
      </div>
      <div class="bg-slate-900 rounded-lg p-3 text-xs">
        <div class="text-amber-300 font-bold mb-1">변경 비용</div>
        <div class="mono text-emerald-300">파일 수정: ontology.ttl 한 곳 (label + altLabel)</div>
        <div class="mono text-emerald-300">데이터·룰·과거기록: 0 변경</div>
        <div class="mono text-emerald-300">→ *명칭과 의미가 분리*되어 있어서 가능</div>
      </div>
    </div>`,

    cost: {
      scenario: '모든 등장 위치 × 모든 시스템 = N × M 변경. 빠뜨림 위험 高. historical accuracy ↔ search 트레이드오프',
      owl: 'URI 한 곳의 label 변경. 룰·데이터·과거기록 모두 그대로. 옛 명칭은 altLabel로 보존',
      lesson: '시나리오는 *이름 = 의미*. OWL은 *URI = 의미, label = 표시*. 명칭이 바뀌어도 *의미는 그대로*.'
    }
  }
};

function selectScenario(s) {
  currentScenario = s;
  changeApplied = false;
  document.getElementById('tab-A').classList.toggle('active', s === 'A');
  document.getElementById('tab-B').classList.toggle('active', s === 'B');
  document.getElementById('scenario-desc').innerHTML = scenarios[s].desc;
  document.getElementById('cost-summary').style.display = 'none';
  render();
}

function applyChange() {
  changeApplied = true;
  render();
  document.getElementById('cost-summary').style.display = 'block';
  renderCostSummary();
}

function resetChange() {
  changeApplied = false;
  render();
  document.getElementById('cost-summary').style.display = 'none';
}

function render() {
  const s = scenarios[currentScenario];
  document.getElementById('left-content').innerHTML = changeApplied
    ? s.leftBefore + '<hr class="my-4 border-slate-200">' + s.leftAfter
    : s.leftBefore;
  document.getElementById('right-content').innerHTML = changeApplied
    ? s.rightBefore + '<hr class="my-4 border-slate-200">' + s.rightAfter
    : s.rightBefore;
}

function renderCostSummary() {
  const s = scenarios[currentScenario];
  document.getElementById('cost-summary').innerHTML = `
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 fade-in">
      <h2 class="font-bold text-slate-800 text-lg mb-4 flex items-center gap-2"><span>📊</span><span>변경 비용 비교</span></h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
          <div class="text-sm font-bold text-red-800 mb-2 flex items-center gap-2">📋 시나리오 방식</div>
          <div class="text-xs text-red-700 leading-relaxed">${s.cost.scenario}</div>
        </div>
        <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
          <div class="text-sm font-bold text-emerald-800 mb-2 flex items-center gap-2">🦉 OWL 추론 방식</div>
          <div class="text-xs text-emerald-700 leading-relaxed">${s.cost.owl}</div>
        </div>
      </div>
      <div class="bg-violet-50 border border-violet-200 rounded-lg p-4">
        <div class="text-sm font-bold text-violet-800 mb-1">💡 핵심 교훈</div>
        <div class="text-xs text-violet-700 leading-relaxed">${s.cost.lesson}</div>
      </div>
    </div>
  `;
}

selectScenario('A');
</script>
</body>
</html>
